<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Leads — Grupo A4B</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #111;
      --border: rgba(255,255,255,0.08);
      --text: #fff;
      --text2: #b0b0b0;
      --text3: #666;
      --green: #4ade80;
      --yellow: #facc15;
      --blue: #60a5fa;
      --red: #f87171;
      --radius: 12px;
      --font: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
    
    .topbar {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .topbar h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
    .topbar h1 span { font-weight: 300; opacity: 0.5; }
    .topbar-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    
    .btn-sm {
      padding: 8px 20px;
      border-radius: 50px;
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      transition: 0.2s;
      text-decoration: none;
    }
    .btn-sm:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
    .btn-sm.primary { background: #fff; color: #000; border-color: #fff; }
    .btn-sm.primary:hover { opacity: 0.85; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      padding: 24px 32px;
    }
    .stat-card {
      padding: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .stat-card .num { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
    .stat-card .label { font-size: 0.8rem; color: var(--text3); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .stat-card.new .num { color: var(--green); }
    .stat-card.contacted .num { color: var(--yellow); }
    .stat-card.converted .num { color: var(--blue); }

    .table-wrap {
      padding: 0 32px 32px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    thead th {
      text-align: left;
      padding: 12px 16px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text3);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      white-space: nowrap;
    }
    tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
      white-space: nowrap;
    }
    tbody tr { transition: 0.2s; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    tbody td:first-child { color: var(--text); font-weight: 600; }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-badge.novo { background: rgba(74,222,128,0.12); color: var(--green); }
    .status-badge.contatado { background: rgba(250,204,21,0.12); color: var(--yellow); }
    .status-badge.convertido { background: rgba(96,165,250,0.12); color: var(--blue); }
    .status-badge.perdido { background: rgba(248,113,113,0.12); color: var(--red); }

    select.status-select {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 6px 10px;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
    }
    select.status-select:focus { border-color: rgba(255,255,255,0.3); }

    .btn-delete {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
      padding: 4px 8px;
    }
    .btn-delete:hover { color: var(--red); }

    .empty-state {
      text-align: center;
      padding: 80px 32px;
      color: var(--text3);
    }
    .empty-state h3 { font-size: 1.2rem; color: var(--text2); margin-bottom: 8px; }
    .empty-state p { font-size: 0.9rem; }

    @media (max-width: 768px) {
      .topbar, .stats, .table-wrap { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>Grupo <span>A4B</span> — Painel de Leads</h1>
    <div class="topbar-actions">
      <button class="btn-sm" onclick="loadLeads()">↻ Atualizar</button>
      <a href="/api/leads/export/csv" class="btn-sm">⬇ Exportar CSV</a>
      <a href="/" class="btn-sm">← Voltar ao site</a>
    </div>
  </div>

  <div class="stats" id="statsGrid">
    <div class="stat-card">
      <div class="num" id="totalCount">—</div>
      <div class="label">Total de leads</div>
    </div>
    <div class="stat-card new">
      <div class="num" id="newCount">—</div>
      <div class="label">Novos</div>
    </div>
    <div class="stat-card contacted">
      <div class="num" id="contactedCount">—</div>
      <div class="label">Contatados</div>
    </div>
    <div class="stat-card converted">
      <div class="num" id="convertedCount">—</div>
      <div class="label">Convertidos</div>
    </div>
  </div>

  <div class="table-wrap">
    <table id="leadsTable">
      <thead>
        <tr>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Telefone</th>
          <th>Empresa</th>
          <th>Data</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="leadsBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
      <h3>Nenhum lead ainda</h3>
      <p>Quando alguém preencher o formulário no site, os leads aparecerão aqui.</p>
    </div>
  </div>

  <script>
    async function loadLeads() {
      try {
        const res = await fetch('/api/leads');
        const leads = await res.json();
        renderLeads(leads);
        updateStats(leads);
      } catch (err) {
        // Fallback: localStorage
        const leads = JSON.parse(localStorage.getItem('a4b_leads') || '[]');
        renderLeads(leads);
        updateStats(leads);
      }
    }

    function renderLeads(leads) {
      const tbody = document.getElementById('leadsBody');
      const empty = document.getElementById('emptyState');
      
      if (leads.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      // Sort by date descending
      leads.sort((a, b) => new Date(b.data) - new Date(a.data));

      tbody.innerHTML = leads.map(l => `
        <tr>
          <td>${esc(l.nome)}</td>
          <td>${esc(l.email)}</td>
          <td>${esc(l.telefone)}</td>
          <td>${esc(l.empresa)}</td>
          <td>${formatDate(l.data)}</td>
          <td>
            <select class="status-select" onchange="updateStatus(${l.id}, this.value)">
              <option value="novo" ${l.status === 'novo' ? 'selected' : ''}>🟢 Novo</option>
              <option value="contatado" ${l.status === 'contatado' ? 'selected' : ''}>🟡 Contatado</option>
              <option value="convertido" ${l.status === 'convertido' ? 'selected' : ''}>🔵 Convertido</option>
              <option value="perdido" ${l.status === 'perdido' ? 'selected' : ''}>🔴 Perdido</option>
            </select>
          </td>
          <td><button class="btn-delete" onclick="deleteLead(${l.id})" title="Excluir">✕</button></td>
        </tr>
      `).join('');
    }

    function updateStats(leads) {
      document.getElementById('totalCount').textContent = leads.length;
      document.getElementById('newCount').textContent = leads.filter(l => l.status === 'novo').length;
      document.getElementById('contactedCount').textContent = leads.filter(l => l.status === 'contatado').length;
      document.getElementById('convertedCount').textContent = leads.filter(l => l.status === 'convertido').length;
    }

    async function updateStatus(id, status) {
      try {
        await fetch(`/api/leads/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        loadLeads();
      } catch (err) { console.error(err); }
    }

    async function deleteLead(id) {
      if (!confirm('Tem certeza que deseja excluir este lead?')) return;
      try {
        await fetch(`/api/leads/${id}`, { method: 'DELETE' });
        loadLeads();
      } catch (err) { console.error(err); }
    }

    function formatDate(d) {
      if (!d) return '—';
      const dt = new Date(d);
      return dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    // Load on page open
    loadLeads();
    // Auto-refresh every 30s
    setInterval(loadLeads, 30000);
  </script>
</body>
</html>
